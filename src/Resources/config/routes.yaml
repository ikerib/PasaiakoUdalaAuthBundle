# PasaiaUdalaAuthBundle routes
# Import in your app: config/routes/pasaiako_udala_auth.yaml
#   pasaiako_udala_auth:
#       resource: '@PasaiaUdalaAuthBundle/Resources/config/routes.yaml'

app_login:
    path: /login
    controller: PasaiaUdala\AuthBundle\Controller\AuthController::selector

app_login_ldap:
    path: /login/ldap
    controller: PasaiaUdala\AuthBundle\Controller\AuthController::loginLdap

oauth_connect:
    path: /connect/giltza
    controller: PasaiaUdala\AuthBundle\Controller\AuthController::oauthConnect

oauth_check:
    path: /connect/giltza/check
    controller: PasaiaUdala\AuthBundle\Controller\AuthController::oauthCheck
